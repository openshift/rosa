name: Update Changelog

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  tag-check:
    runs-on: ubuntu-latest
    steps:
      - name: Validate stable release tag
        run: |
          set -euo pipefail
          [[ "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]] \
            || { echo "❌  Tag '${GITHUB_REF_NAME}' is not a stable release tag"; exit 1; }
  update-changelog:
    needs: tag-check
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout master
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: master
          fetch-depth: 0

      - name: Find previous stable release tag
        id: prev-tag
        run: |
          git fetch --tags --force
          CURRENT_TAG="${{ github.ref_name }}"
          PREV_TAG=$(git tag -l 'v*' \
            | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' \
            | sort -V \
            | grep -B1 "^${CURRENT_TAG}$" \
            | head -1)
          if [ -z "$PREV_TAG" ] || [ "$PREV_TAG" = "$CURRENT_TAG" ]; then
            echo "No previous stable tag found for ${CURRENT_TAG}"
            echo "prev_tag=" >> $GITHUB_OUTPUT
            exit 0
          fi
          echo "Previous stable tag: $PREV_TAG"
          echo "prev_tag=$PREV_TAG" >> $GITHUB_OUTPUT

      - name: Check if there are commits between tags
        if: steps.prev-tag.outputs.prev_tag != ''
        id: check-commits
        run: |
          COUNT=$(git rev-list --count "${{ steps.prev-tag.outputs.prev_tag }}..${{ github.ref_name }}" || echo "0")
          echo "commit_count=$COUNT" >> $GITHUB_OUTPUT
          echo "Found $COUNT commit(s) between ${{ steps.prev-tag.outputs.prev_tag }} and ${{ github.ref_name }}"

      - name: Set release version
        if: steps.check-commits.outputs.commit_count != '0'
        run: echo "RELEASE_VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Generate changelog
        if: steps.check-commits.outputs.commit_count != '0'
        uses: orhun/git-cliff-action@f50e11560dce63f7c33227798f90b924471a88b5 # v4.8.0
        with:
          config: cliff.toml
          args: --verbose ${{ steps.prev-tag.outputs.prev_tag }}..${{ github.ref_name }} --tag ${{ env.RELEASE_VERSION }} --prepend CHANGELOG.md

      - name: Create PR with changelog
        if: steps.check-commits.outputs.commit_count != '0'
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: changelog-${{ github.ref_name }}
          base: master
          # Auto-generated changelog PRs keep the existing OCM placeholder key; contributor work may use OCM or ROSAENG tickets.
          title: "OCM-00000 | chore: add changelog for ${{ github.ref_name }}"
          body: |
            ## Changelog for ${{ github.ref_name }}

            Auto-generated changelog entry for release ${{ github.ref_name }}.

            **Release tag**: `${{ github.ref_name }}`
            **Previous tag**: `${{ steps.prev-tag.outputs.prev_tag }}`

            Auto-generated by GitHub Actions.
          # Keep the generated commit subject aligned with the workflow's placeholder Jira key.
          commit-message: "OCM-00000 | chore: add changelog for ${{ github.ref_name }}"
          labels: changelog
          delete-branch: true
          add-paths: "CHANGELOG.md"
          sign-commits: true
